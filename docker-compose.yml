services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev

    container_name: veerpreps-api-dev

    ports:
      - "8080:8080"

    env_file:
      - .env

    volumes:
      - .:/app
      - /app/node_modules

    command: npm run dev

    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine

    container_name: postgres-db

    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: veerpreps

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: